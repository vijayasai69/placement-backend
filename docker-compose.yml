version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: placement_rec_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: placement_rec
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    container_name: placement_rec_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/placement_rec?schema=public
      - BETTER_AUTH_SECRET=a_very_secure_and_long_better_auth_secret_key_12345
      - BETTER_AUTH_URL=http://localhost:5000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=noreply@placementrecommendation.com
    depends_on:
      - db

volumes:
  pgdata:
